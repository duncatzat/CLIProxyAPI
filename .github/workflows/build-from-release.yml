name: Build image from upstream release

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cli-proxy-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream latest release
        id: upstream
        run: |
          set -euo pipefail
          TAG=$(curl -sL https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | grep -o '"tag_name": "[^"]*"' | head -1 | cut -d'"' -f4)
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream release: $TAG (version $VERSION)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download upstream release binaries
        run: |
          set -euo pipefail
          TAG="${{ steps.upstream.outputs.tag }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          mkdir -p bins/amd64 bins/arm64
          echo "Downloading amd64 binary..."
          curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/${TAG}/CLIProxyAPI_${VERSION}_linux_amd64.tar.gz" | tar -xz -C bins/amd64
          echo "Downloading arm64 binary..."
          curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/${TAG}/CLIProxyAPI_${VERSION}_linux_aarch64.tar.gz" | tar -xz -C bins/arm64
          ls -la bins/amd64/ bins/arm64/

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.tag }}
